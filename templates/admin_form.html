{% extends 'base.html' %}

{% block content %}
  {% if mode == 'new' %}
    <h1>新建文章</h1>
  {% else %}
    <h1>编辑文章：{{ post.title }}</h1>
  {% endif %}

  <form method="post">
    <label for="title">标题</label>
    <input type="text" id="title" name="title" value="{{ post.title if post else '' }}" />

    <label for="post_id">文章 ID（用于 URL）</label>
    <input type="text" id="post_id" name="post_id" value="{{ post.id if post else '' }}" />

    <label for="date">日期 (YYYY-MM-DD)</label>
    <input type="text" id="date" name="date" value="{{ post.date if post else today }}" />

    <label for="summary">简介（summary）</label>
    <input type="text" id="summary" name="summary" value="{{ post.summary if post else '' }}" />

    <label for="tags">标签（用逗号或分号分隔）</label>
    <input type="text" id="tags" name="tags" value="{{ ', '.join(post.tags) if post and post.tags else '' }}" />

    <label for="filename">Markdown 文件名（位于 posts/ 目录下）</label>
    <input type="text" id="filename" name="filename" value="{{ post.file if post else '' }}" />

    <label for="content">正文内容（Markdown）</label>
    <textarea id="content" name="content">{{ content }}</textarea>

    <p style="margin-top: 12px;">
      <input type="submit" value="保存" />
      <a href="{{ url_for('admin_index') }}" class="button secondary">返回列表</a>
    </p>
  </form>
{% endblock %}
