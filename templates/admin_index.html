{% extends 'base.html' %}

{% block content %}
  <h1>文章列表</h1>
  <p>
    <a href="{{ url_for('admin_new') }}" class="button">+ 新建文章</a>
  </p>
  {% if posts %}
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>标题</th>
          <th>日期</th>
          <th>标签</th>
          <th>文件</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        {% for p in posts %}
          <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.title }}</td>
            <td>{{ p.date }}</td>
            <td>{{ ', '.join(p.tags) if p.tags else '' }}</td>
            <td>{{ p.file }}</td>
            <td>
              <a href="{{ url_for('admin_edit', post_id=p.id) }}" class="button secondary">编辑</a>
              <a href="/post.html?id={{ p.id }}" class="button secondary" target="_blank">预览</a>
            </td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>当前还没有文章。</p>
  {% endif %}
{% endblock %}
