<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>博客后台管理</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, -webkit-system-font, sans-serif;
        margin: 0;
        padding: 0;
        background: #f5f5f7;
        color: #1d1d1f;
      }
      header {
        background: #111827;
        color: #f9fafb;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header a {
        color: inherit;
        text-decoration: none;
        margin-right: 12px;
      }
      main {
        max-width: 960px;
        margin: 24px auto;
        padding: 16px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 8px 10px;
        border-bottom: 1px solid #e5e7eb;
        text-align: left;
        font-size: 14px;
      }
      th {
        background: #f9fafb;
        font-weight: 600;
      }
      a.button, button, input[type="submit"] {
        display: inline-block;
        padding: 6px 12px;
        font-size: 14px;
        border-radius: 999px;
        border: 1px solid #111827;
        background: #111827;
        color: #f9fafb;
        cursor: pointer;
        text-decoration: none;
      }
      a.button.secondary {
        background: #ffffff;
        color: #111827;
      }
      form label {
        display: block;
        margin: 8px 0 4px;
        font-size: 14px;
        font-weight: 500;
      }
      form input[type="text"],
      form textarea {
        width: 100%;
        padding: 6px 8px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 14px;
        font-family: inherit;
        box-sizing: border-box;
      }
      form textarea {
        min-height: 220px;
        resize: vertical;
        line-height: 1.5;
      }
      .flash {
        margin-bottom: 12px;
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 14px;
      }
      .flash.success {
        background: #ecfdf5;
        color: #166534;
        border: 1px solid #bbf7d0;
      }
      .flash.error {
        background: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }
    </style>
  </head>
  <body>
    <header>
      <div><strong>博客后台管理</strong></div>
      <nav>
        <a href="{{ url_for('admin_index') }}">文章列表</a>
        <a href="{{ url_for('admin_profile') }}">个人资料</a>
        <a href="{{ url_for('admin_new') }}">新建文章</a>
      </nav>
    </header>
    <main>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
